name: Deploy radio server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy server files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: macka.agtc.app
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "server/"
          target: "/srv/macka/"
          strip_components: 1

      - name: Install deps & restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: macka.agtc.app
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            pip3 install -r /srv/macka/requirements.txt -q
            systemctl restart macka-radio
            sleep 2
            systemctl is-active macka-radio
