name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    if: >
      contains(toJson(github.event.commits), '"app/') ||
      contains(toJson(github.event.commits), '"public/') ||
      contains(toJson(github.event.commits), 'package.json') ||
      contains(toJson(github.event.commits), 'next.config')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        run: pnpm build

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: macka.agtc.app
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "out/"
          target: "/srv/macka/web-new"
          strip_components: 1

      - name: Swap web root
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: macka.agtc.app
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            rm -rf /srv/macka/web-old
            mv /srv/macka/web /srv/macka/web-old 2>/dev/null || true
            mv /srv/macka/web-new /srv/macka/web
            curl -sf https://macka.agtc.app/ | grep -q "Macka" && echo "✓ frontend ok" || echo "⚠ check frontend"

  deploy-server:
    runs-on: ubuntu-latest
    if: contains(toJson(github.event.commits), '"server/')
    steps:
      - uses: actions/checkout@v4

      - name: Enter mindfulness mode
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: macka.agtc.app
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            PID=$(systemctl show -p MainPID macka-radio --value 2>/dev/null || echo "")
            if [ -n "$PID" ] && [ "$PID" != "0" ]; then
              kill -USR1 "$PID" && echo "→ mindfulness signal sent to PID $PID"
            fi

      - name: Deploy server files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: macka.agtc.app
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "server/"
          target: "/srv/macka/"
          strip_components: 1

      - name: Restart with deploy trigger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: macka.agtc.app
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            pip3 install -r /srv/macka/requirements.txt -q
            touch /tmp/macka_deploy
            systemctl restart macka-radio
            sleep 3
            systemctl is-active macka-radio
            curl -sf https://macka.agtc.app/now && echo " ✓ /now ok"
