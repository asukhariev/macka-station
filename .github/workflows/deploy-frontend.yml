name: Deploy frontend

on:
  push:
    branches: [master]
    paths:
      - 'app/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'next.config.*'
      - 'tsconfig.json'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        run: pnpm build

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: macka.agtc.app
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "out/"
          target: "/srv/macka/web-new"
          strip_components: 1

      - name: Swap web root
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: macka.agtc.app
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            rm -rf /srv/macka/web-old
            mv /srv/macka/web /srv/macka/web-old 2>/dev/null || true
            mv /srv/macka/web-new /srv/macka/web
            curl -sf https://macka.agtc.app/ | grep -q "Macka" && echo "✓ frontend ok" || echo "⚠ check frontend"
